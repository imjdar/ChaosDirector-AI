name: Java CI/CD Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Build ChaosPlugin
      run: |
        cd ChaosPlugin
        chmod +x gradlew
        ./gradlew build

    - name: Build UHCScenarios
      run: |
        cd UHCScenarios
        chmod +x gradlew
        ./gradlew build

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: server-plugins
        path: |
          ChaosPlugin/build/libs/*.jar
          UHCScenarios/build/libs/*.jar

    - name: Verify Brain Docker Build
      run: |
        cd ChaosDirector/brain
        docker build -t ia-brain-test .
